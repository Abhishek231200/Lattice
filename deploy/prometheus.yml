global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: pageserver
    static_configs:
      - targets: ["pageserver:5000"]
    metrics_path: /metrics

  - job_name: control-plane
    static_configs:
      - targets: ["control-plane:5002"]
    metrics_path: /metrics

  - job_name: postgres-compute
    static_configs:
      - targets: ["compute-pg:9187"]   # postgres_exporter sidecar
    metrics_path: /metrics

  - job_name: docker-cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    metrics_path: /metrics
